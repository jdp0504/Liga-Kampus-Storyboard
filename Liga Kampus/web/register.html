<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga-Kampus | Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="mb-4">
                    <h1>Create Account</h1>
                    <p class="text-muted">Register to get access to the Liga-Kampus platform.</p>
                </div>

                <form id="registerForm" class="needs-validation" onsubmit="handleRegisterSubmit(event)" novalidate>
                    
                    <div class="alert alert-danger d-none py-2 text-center" id="registrationErrorAlert">
                        Passwords do not match.
                    </div>

                    <div class="mb-3">
                        <label for="fullNameInput" class="form-label fw-bold">Username</label>
                        <input type="text" class="form-control" id="fullNameInput" required placeholder="Enter Full Name">
                        <div class="invalid-feedback">Please enter your full name.</div>
                    </div>

                    <div class="mb-3">
                        <label for="usernameInput" class="form-label fw-bold">Student ID</label>
                        <input type="text" class="form-control" id="usernameInput" required placeholder="Enter Student ID or Username">
                        <div class="invalid-feedback">Please choose a username or enter your Student ID.</div>
                    </div>

                    <div class="mb-3">
                        <label for="facultySelect" class="form-label fw-bold">Faculty</label>
                        <select class="form-select" id="facultySelect" required>
                            <option value="" disabled selected>-- Choose your faculty --</option>
                            <option value="FSKM">FSKM</option>
                            <option value="FK">FK</option>
                            <option value="FPP">FPP</option>
                            <option value="FSPU">FSPU</option>
                        </select>
                        <div class="invalid-feedback">Please select your faculty.</div>
                    </div>

                    <div class="mb-3">
                        <label for="passwordInput" class="form-label fw-bold">Password</label>
                        <input type="password" class="form-control" id="passwordInput" required placeholder="Create Password">
                        <div class="invalid-feedback">Password is required.</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPasswordInput" class="form-label fw-bold">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPasswordInput" required placeholder="Repeat Password">
                        <div class="invalid-feedback">Please confirm your password.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        Register Account
                    </button>

                    <div class="text-center">
                        <p class="text-muted small">Already have an account? <a href="user_login.html" class="text-decoration-none fw-semibold">Login here</a></p>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script>
        function handleRegisterSubmit(event) {
            event.preventDefault();
            event.stopPropagation();

            const form = document.getElementById('registerForm');
            const alertBox = document.getElementById('registrationErrorAlert');
            
            const password = document.getElementById('passwordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput').value;

            alertBox.classList.add('d-none');

            // Form validation fallback
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            // Check if passwords match
            if (password !== confirmPassword) {
                alertBox.classList.remove('d-none');
                return;
            }

            // Successful registration simulation
            alert("Registration complete! You can now log in.");
            window.location.href = "user_login.html";
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
