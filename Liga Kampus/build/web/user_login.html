<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga-Kampus | Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="mb-4">
                    <h1>Welcome to Liga-Kampus</h1>
                    <div >
                        <strong>Sample Username and Password:</strong><br>
                        Username: student_user<br>
                        Password: student123
                    </div>
                </div>

                <form id="authForm" class="needs-validation" onsubmit="handleAuthSubmit(event)" novalidate>
                    
                    <div class="alert alert-danger d-none py-2 text-center" id="authErrorAlert">
                        Invalid username or password.
                    </div>

                    <div class="mb-3">
                        <label for="usernameInput" class="form-label fw-bold">Student ID / Username</label>
                        <input type="text" class="form-control" id="usernameInput" required placeholder="Enter Username">
                        <div class="invalid-feedback">Username cannot be empty.</div>
                    </div>

                    <div class="mb-3">
                        <label for="passwordInput" class="form-label fw-bold">Password</label>
                        <input type="password" class="form-control" id="passwordInput" required placeholder="Enter Password">
                        <div class="invalid-feedback">Password is required.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        Login
                    </button>

                    <div class="text-center">
                        <p class="text-muted small">New to the platform? <a href="register.html" class="text-decoration-none fw-semibold">Register as new user</a></p>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script>
        function handleAuthSubmit(event) {
            event.preventDefault();
            event.stopPropagation();

            const form = document.getElementById('authForm');
            const alertBox = document.getElementById('authErrorAlert');
            
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            alertBox.classList.add('d-none');

            if (username === 'student_user' && password === 'student123') {
                alert("Login successful!");
                window.location.href = "index.html";
            } else {
                alertBox.classList.remove('d-none');
                form.classList.remove('was-validated');
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
